<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teams Control Icons Preview</title>
<style>
  body { background: #1a1a2e; font-family: sans-serif; color: #eee; padding: 30px; }
  h2 { color: #aaa; font-size: 14px; text-transform: uppercase; margin: 24px 0 8px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .item { text-align: center; }
  .item img { display: block; width: 72px; height: 72px; border-radius: 8px; }
  .item span { font-size: 11px; color: #777; margin-top: 4px; display: block; }
</style>
</head>
<body>
<h1 style="color:#fff;margin-bottom:4px">Teams Control — Icon Preview</h1>

<h2>Mikrofon</h2>
<div class="row">
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/mic-on.png"><span>on (grün)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/mic-off.png"><span>off / stumm (rot)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/mic-inactive.png"><span>kein Meeting (grau)</span></div>
</div>

<h2>Kamera</h2>
<div class="row">
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/camera-on.png"><span>on (grün)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/camera-off.png"><span>off (rot)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/camera-inactive.png"><span>kein Meeting (grau)</span></div>
</div>

<h2>Hintergrund Blur</h2>
<div class="row">
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/blur-on.png"><span>blur an (grün)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/blur-off.png"><span>blur aus (rot)</span></div>
  <div class="item"><img src="com.kosmonautica.teams-control.sdPlugin/imgs/actions/blur-inactive.png"><span>kein Meeting (grau)</span></div>
</div>
</body>
</html>
